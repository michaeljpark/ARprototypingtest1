<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Wall Marquee AR</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Intro ── */
    #intro {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 32px 24px; gap: 16px;
      background: radial-gradient(ellipse at top, #1a0028 0%, transparent 60%),
                  linear-gradient(180deg, #0a0014, #000);
    }
    #intro h1 {
      font-size: 30px; font-weight: 800; letter-spacing: -.03em; text-align: center;
      background: linear-gradient(90deg, #ff2266, #ff8800);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sub { font-size: 14px; line-height: 1.65; color: #999; text-align: center; max-width: 300px; }
    #marquee-input {
      width: 100%; max-width: 320px; padding: 13px 16px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15);
      border-radius: 12px; color: #fff; font-size: 15px; outline: none; transition: border-color .15s;
    }
    #marquee-input:focus { border-color: #ff2266; }
    #start-btn {
      padding: 14px 36px; border: none; border-radius: 999px; cursor: pointer;
      background: linear-gradient(90deg, #ff2266, #ff8800); color: #fff;
      font-size: 16px; font-weight: 700; box-shadow: 0 8px 28px rgba(255,34,102,.4);
    }
    #marker-link {
      font-size: 13px; color: #ff8800; text-decoration: underline;
      cursor: pointer; text-align: center;
    }
    .step {
      font-size: 12px; color: #555; text-align: center; max-width: 300px; line-height: 1.7;
    }
    .step b { color: #888; }

    /* ── AR overlay ── */
    #overlay {
      position: fixed; inset: 0; z-index: 100; pointer-events: none; display: none;
    }
    #status {
      position: absolute;
      top: max(env(safe-area-inset-top, 0px), 12px); left: 50%;
      transform: translateX(-50%); margin-top: 8px; padding: 7px 16px;
      background: rgba(0,0,0,.65); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.12); border-radius: 999px;
      font-size: 12px; font-weight: 600; letter-spacing: .02em; white-space: nowrap;
    }
    #controls {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom, 0px));
      display: flex; flex-direction: column; gap: 9px;
      background: linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 100%);
      pointer-events: all;
    }
    #ctrl-text {
      width: 100%; padding: 10px 14px;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px; color: #fff; font-size: 14px; outline: none;
    }
    #ctrl-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 9px 15px; border: 1px solid rgba(255,255,255,.18); border-radius: 999px;
      background: rgba(255,255,255,.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

<!-- ── INTRO ── -->
<div id="intro">
  <h1>Wall Marquee AR</h1>
  <p class="sub">Hiro 마커를 벽에 붙이거나 화면에 띄운 후<br>카메라로 가리키면 전광판이 나타납니다.</p>
  <input id="marquee-input" type="text" placeholder="마키 텍스트 입력..."
         value="★ NOW PLAYING ★ BROADWAY LIVE ★ ">
  <button id="start-btn">카메라 시작</button>
  <a id="marker-link"
     href="https://raw.githack.com/AR-js-org/AR.js/master/data/images/hiro.png"
     target="_blank" rel="noopener">
    → Hiro 마커 열기 (출력 또는 화면에 띄우기)
  </a>
  <p class="step">
    <b>① 마커 열기</b> → 다른 기기 화면이나 종이에 띄우기<br>
    <b>② 카메라 시작</b> → 마커를 카메라 중앙에 맞추기<br>
    <b>③</b> 마커가 인식되면 전광판이 공간에 고정됨
  </p>
</div>

<!-- ── AR OVERLAY ── -->
<div id="overlay">
  <div id="status">Hiro 마커를 카메라에 보여주세요…</div>
  <div id="controls">
    <input id="ctrl-text" type="text" placeholder="텍스트 변경...">
    <div id="ctrl-btns">
      <button class="btn" id="btn-speed">속도 0.4</button>
      <button class="btn" id="btn-size">크기 M</button>
    </div>
  </div>
</div>

<script>
  // ── Config ──
  const speeds = [0.2, 0.4, 0.8, 1.5];
  const sizes  = [
    { l: 'S', w: 0.8,  h: 0.15 },
    { l: 'M', w: 1.6,  h: 0.29 },
    { l: 'L', w: 2.6,  h: 0.47 },
  ];
  let si = 1, szi = 1;
  let marqueeEntity = null;

  function setStatus(t) {
    document.getElementById('status').textContent = t;
  }

  // ── A-Frame component: animated marquee plane ──
  AFRAME.registerComponent('marquee-sign', {
    schema: {
      text:   { type: 'string', default: '★ NOW PLAYING ★ BROADWAY LIVE ★ ' },
      speed:  { type: 'number', default: 0.4 },
      width:  { type: 'number', default: 1.6 },
      height: { type: 'number', default: 0.29 },
    },

    init() {
      this.mesh    = null;
      this.texture = null;
      this._t      = 0;
    },

    update(oldData) {
      const d = this.data;
      const needsRebuild = !oldData ||
        d.text !== oldData.text || d.width !== oldData.width || d.height !== oldData.height;
      if (needsRebuild) this._buildMesh();
    },

    _buildMesh() {
      const THREE = AFRAME.THREE;
      if (this.mesh) {
        this.el.object3D.remove(this.mesh);
        this.mesh.geometry.dispose();
        this.mesh.material.dispose();
      }
      if (this.texture) this.texture.dispose();

      const { width, height, text } = this.data;

      // Canvas texture
      const W = 2048, H = 256;
      const cv = document.createElement('canvas');
      cv.width = W; cv.height = H;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#070010';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(255,34,102,.07)';
      for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 1);
      ctx.font = 'bold 140px -apple-system,"Helvetica Neue",Arial,sans-serif';
      ctx.textBaseline = 'middle';
      ctx.shadowColor  = '#ff0055';
      ctx.shadowBlur   = 40;
      ctx.fillStyle    = '#ff3a78';
      const tw = Math.max(ctx.measureText(text).width, 1);
      const n  = Math.ceil(W / tw) + 2;
      for (let i = 0; i < n; i++) ctx.fillText(text, i * tw, H / 2);

      this.texture = new THREE.CanvasTexture(cv);
      this.texture.wrapS     = THREE.RepeatWrapping;
      this.texture.wrapT     = THREE.ClampToEdgeWrapping;
      this.texture.minFilter = THREE.LinearFilter;
      this.texture.magFilter = THREE.LinearFilter;
      this.texture.anisotropy = 4;

      const geo = new THREE.PlaneGeometry(width, height);
      const mat = new THREE.ShaderMaterial({
        uniforms: {
          map:  { value: this.texture },
          uOff: { value: 0 },
          uRep: { value: Math.max(width / 1.6, 0.1) },
          uA:   { value: 1.0 },
        },
        vertexShader: `
          varying vec2 vUv;
          void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.); }
        `,
        fragmentShader: `
          uniform sampler2D map;
          uniform float uOff, uRep, uA;
          varying vec2 vUv;
          void main(){
            vec4 c = texture2D(map, vec2(vUv.x * uRep + uOff, vUv.y));
            gl_FragColor = vec4(c.rgb, c.a * uA);
          }
        `,
        side:        THREE.DoubleSide,
        transparent: true,
        depthWrite:  false,
      });

      this.mesh = new THREE.Mesh(geo, mat);
      this.el.object3D.add(this.mesh);
    },

    tick(time) {
      if (this.mesh) {
        this.mesh.material.uniforms.uOff.value = -(time / 1000) * this.data.speed / 2.5;
      }
    },

    remove() {
      if (this.mesh) {
        this.el.object3D.remove(this.mesh);
        this.mesh.geometry.dispose();
        this.mesh.material.dispose();
      }
      if (this.texture) this.texture.dispose();
    },
  });

  // ── Start ──
  document.getElementById('start-btn').addEventListener('click', () => {
    const rawText = document.getElementById('marquee-input').value.trim();
    const text    = (rawText || '★ NOW PLAYING ★ BROADWAY LIVE ★ ') + ' ';
    document.getElementById('ctrl-text').value = rawText;

    // Build A-Frame scene dynamically (avoids camera prompt on page load)
    const scene = document.createElement('a-scene');
    scene.setAttribute('arjs', 'sourceType: webcam; debugUIEnabled: false;');
    scene.setAttribute('renderer', 'logarithmicDepthBuffer: true;');
    scene.setAttribute('vr-mode-ui', 'enabled: false');

    const marker = document.createElement('a-marker');
    marker.setAttribute('preset', 'hiro');
    marker.setAttribute('id', 'hiro-marker');

    marker.addEventListener('markerFound', () =>
      setStatus('마커 인식됨 — 카메라를 안정적으로 유지하세요'));
    marker.addEventListener('markerLost', () =>
      setStatus('Hiro 마커를 카메라에 보여주세요…'));

    // Entity sits flat on the marker surface (rotation -90 aligns XY plane to marker face)
    const entity = document.createElement('a-entity');
    entity.setAttribute('id', 'marquee-entity');
    entity.setAttribute('rotation', '-90 0 0');
    entity.setAttribute('marquee-sign', {
      text,
      speed:  speeds[si],
      width:  sizes[szi].w,
      height: sizes[szi].h,
    });

    marker.appendChild(entity);

    const cam = document.createElement('a-entity');
    cam.setAttribute('camera', '');

    scene.appendChild(marker);
    scene.appendChild(cam);
    document.body.appendChild(scene);

    marqueeEntity = entity;
    document.getElementById('intro').style.display   = 'none';
    document.getElementById('overlay').style.display = 'block';
  });

  // ── Controls ──
  document.getElementById('btn-speed').addEventListener('click', function () {
    si = (si + 1) % speeds.length;
    this.textContent = `속도 ${speeds[si]}`;
    if (marqueeEntity) marqueeEntity.setAttribute('marquee-sign', 'speed', speeds[si]);
  });

  document.getElementById('btn-size').addEventListener('click', function () {
    szi = (szi + 1) % sizes.length;
    this.textContent = `크기 ${sizes[szi].l}`;
    if (marqueeEntity) {
      marqueeEntity.setAttribute('marquee-sign', 'width',  sizes[szi].w);
      marqueeEntity.setAttribute('marquee-sign', 'height', sizes[szi].h);
    }
  });

  document.getElementById('ctrl-text').addEventListener('input', e => {
    const v = e.target.value.trim();
    if (!v || !marqueeEntity) return;
    marqueeEntity.setAttribute('marquee-sign', 'text', v + ' ');
  });
</script>
</body>
</html>
