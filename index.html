<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Sphere AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
    #bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    #canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; touch-action: none; }
    #overlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, rgba(0,8,12,0.96) 0%, rgba(0,20,28,0.96) 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; z-index: 20;
    }
    #overlay h1 { color: #00ffcc; font-size: 26px; letter-spacing: 8px; text-shadow: 0 0 24px rgba(0,255,204,0.45); }
    #overlay p { color: rgba(0,255,204,0.55); font-size: 13px; text-align: center; max-width: 256px; line-height: 1.9; }
    #start-btn {
      margin-top: 8px; padding: 13px 44px;
      background: transparent; color: #00ffcc;
      border: 1.5px solid rgba(0,255,204,0.7); border-radius: 2px;
      font-size: 14px; font-family: inherit; letter-spacing: 4px; cursor: pointer;
      box-shadow: 0 0 18px rgba(0,255,204,0.15);
    }
    #start-btn:active { background: rgba(0,255,204,0.12); box-shadow: 0 0 32px rgba(0,255,204,0.35); }

    #hud {
      display: none; position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%);
      color: rgba(0,255,204,0.35); font-size: 10px; letter-spacing: 2px;
      z-index: 10; pointer-events: none; text-align: center; white-space: nowrap;
    }
    #debug {
      display: none; position: fixed; top: 12px; left: 12px;
      color: #00ffcc; font-size: 11px; line-height: 1.5;
      background: rgba(0,14,14,0.7); padding: 8px 12px;
      border: 1px solid rgba(0,255,204,0.4); border-radius: 4px;
      z-index: 10; pointer-events: none; min-width: 180px;
    }
    #crosshair { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 18px; height: 18px; z-index: 10; pointer-events: none; }
    #crosshair::before, #crosshair::after { content:''; position:absolute; background: rgba(0,255,204,0.45); }
    #crosshair::before { top: 50%; left: 0; width: 100%; height: 1px; transform: translateY(-50%); }
    #crosshair::after  { top: 0; left: 50%; height: 100%; width: 1px; transform: translateX(-50%); }
  </style>
</head>
<body>

<video id="bg" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="overlay">
  <h1>SPHERE AR</h1>
  <p>카메라 + 자이로센서<br>구형 그리드 공간을 탐색합니다<br><br>폰을 360&deg; 움직여보세요</p>
  <button id="start-btn">ENTER</button>
</div>

<div id="hud">SPHERICAL GRID &nbsp;&middot;&nbsp; GYRO TRACKING</div>
<div id="debug">GYRO: waiting...</div>
<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>
<script>
function sphToVec3(r, lat, lon) {
  var phi = THREE.MathUtils.degToRad(90 - lat);
  var theta = THREE.MathUtils.degToRad(lon);
  return new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function makeLabel(text) {
  var W = 224, H = 60;
  var c = document.createElement('canvas');
  c.width = W; c.height = H;
  var ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(0,14,14,0.82)';
  rrect(ctx, 3, 3, W-6, H-6, 9);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,255,204,0.9)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.font = "bold 26px 'Courier New', monospace";
  ctx.fillStyle = '#00ffcc';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, W/2, H/2);
  var tex = new THREE.CanvasTexture(c);
  var mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  var sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.9, 0.5, 1);
  return sprite;
}

var dbg = document.getElementById('debug');
function setDbg(msg) { dbg.innerText = msg; }

document.getElementById('start-btn').addEventListener('click', async function() {
  // Camera
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } },
      audio: false
    });
    document.getElementById('bg').srcObject = stream;
  } catch(e) {
    alert('카메라 오류: ' + e.message);
  }

  // iOS gyro permission (requires user gesture)
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      var res = await DeviceOrientationEvent.requestPermission();
      setDbg('GYRO permission: ' + res);
      if (res !== 'granted') {
        alert('자이로센서 권한이 거부되었습니다. Safari 설정 > 웹사이트 > 동작 및 방향 > 허용');
        return;
      }
    } catch(e) {
      alert('자이로 권한 요청 실패: ' + e.message);
    }
  } else {
    setDbg('GYRO: no permission API');
  }

  document.getElementById('overlay').style.display  = 'none';
  document.getElementById('hud').style.display       = 'block';
  document.getElementById('debug').style.display     = 'block';
  document.getElementById('crosshair').style.display = 'block';
  init();
});

function init() {
  var canvas = document.getElementById('canvas');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x000000, 0);

  var scene  = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 60);
  scene.add(camera);

  var R = 10;

  var sGeo = new THREE.SphereGeometry(R, 24, 16);
  var sMat = new THREE.MeshBasicMaterial({
    color: 0x00ffcc, wireframe: true,
    transparent: true, opacity: 0.09, side: THREE.BackSide
  });
  scene.add(new THREE.Mesh(sGeo, sMat));

  var equatorMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.4 });
  var equator = new THREE.Mesh(new THREE.TorusGeometry(R, 0.025, 8, 120), equatorMat);
  scene.add(equator);

  for (var i = 0; i < 4; i++) {
    var m = new THREE.Mesh(
      new THREE.TorusGeometry(R, 0.012, 8, 120),
      new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.18 })
    );
    m.rotation.y = (i / 4) * Math.PI;
    m.rotation.x = Math.PI / 2;
    scene.add(m);
  }

  var nodes = [
    { label: 'text1',  lat:  0,  lon:   0 },
    { label: 'text2',  lat:  0,  lon:  45 },
    { label: 'text3',  lat:  0,  lon:  90 },
    { label: 'text4',  lat:  0,  lon: 135 },
    { label: 'text5',  lat:  0,  lon: 180 },
    { label: 'text6',  lat:  0,  lon: 225 },
    { label: 'text7',  lat:  0,  lon: 270 },
    { label: 'text8',  lat:  0,  lon: 315 },
    { label: 'text9',  lat:  45, lon:   0 },
    { label: 'text10', lat:  45, lon:  60 },
    { label: 'text11', lat:  45, lon: 120 },
    { label: 'text12', lat:  45, lon: 180 },
    { label: 'text13', lat:  45, lon: 240 },
    { label: 'text14', lat:  45, lon: 300 },
    { label: 'text15', lat: -45, lon:  30 },
    { label: 'text16', lat: -45, lon:  90 },
    { label: 'text17', lat: -45, lon: 150 },
    { label: 'text18', lat: -45, lon: 210 },
    { label: 'text19', lat: -45, lon: 270 },
    { label: 'text20', lat: -45, lon: 330 },
    { label: 'text21', lat:  80, lon:   0 },
    { label: 'text22', lat: -80, lon:   0 }
  ];

  nodes.forEach(function(n) {
    var dot = new THREE.Mesh(
      new THREE.SphereGeometry(0.09, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0x00ffcc })
    );
    dot.position.copy(sphToVec3(R - 0.05, n.lat, n.lon));
    scene.add(dot);

    var sprite = makeLabel(n.label);
    sprite.position.copy(sphToVec3(R - 0.9, n.lat, n.lon));
    scene.add(sprite);
  });

  // ── Gyroscope (proper Three.js DeviceOrientationControls math) ──────────
  var zee = new THREE.Vector3(0, 0, 1);
  var q1  = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // -PI/2 around X
  var q0  = new THREE.Quaternion();
  var euler = new THREE.Euler();
  var gyroActive = false;
  var lastAlpha = null;

  function setCameraQuat(alpha, beta, gamma, orient) {
    euler.set(beta, alpha, -gamma, 'YXZ');
    camera.quaternion.setFromEuler(euler);
    camera.quaternion.multiply(q1);
    camera.quaternion.multiply(q0.setFromAxisAngle(zee, -orient));
  }

  function onOrientation(e) {
    if (e.alpha === null || e.alpha === undefined) {
      setDbg('GYRO: alpha=null');
      return;
    }
    gyroActive = true;
    var a = THREE.MathUtils.degToRad(e.alpha);
    var b = THREE.MathUtils.degToRad(e.beta);
    var g = THREE.MathUtils.degToRad(e.gamma);
    var o = THREE.MathUtils.degToRad((screen.orientation && screen.orientation.angle) || window.orientation || 0);
    setCameraQuat(a, b, g, o);
    lastAlpha = e.alpha;
    setDbg(
      'GYRO ON\n' +
      'a: ' + e.alpha.toFixed(1) + '\n' +
      'b: ' + e.beta.toFixed(1) + '\n' +
      'g: ' + e.gamma.toFixed(1)
    );
  }

  // Try absolute first (more stable on iOS), fallback to regular
  if ('ondeviceorientationabsolute' in window) {
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
  }
  window.addEventListener('deviceorientation', onOrientation, true);

  // Drag fallback (desktop / no gyro)
  var dragging = false, px = 0, py = 0, yaw = 0, pitch = 0;
  canvas.addEventListener('pointerdown', function(e) { dragging = true; px = e.clientX; py = e.clientY; });
  window.addEventListener('pointerup',   function()  { dragging = false; });
  canvas.addEventListener('pointermove', function(e) {
    if (!dragging || gyroActive) return;
    yaw   -= (e.clientX - px) * 0.003;
    pitch -= (e.clientY - py) * 0.003;
    pitch  = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
    px = e.clientX; py = e.clientY;
    var qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw);
    var qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), pitch);
    camera.quaternion.multiplyQuaternions(qY, qX);
  });

  window.addEventListener('resize', function() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // After 2s if no gyro events, alert user
  setTimeout(function() {
    if (!gyroActive) {
      setDbg('GYRO: no events received\n드래그로 둘러보세요');
    }
  }, 2000);

  var clock = new THREE.Clock();
  (function animate() {
    requestAnimationFrame(animate);
    var t = clock.getElapsedTime();
    equator.material.opacity = 0.28 + 0.12 * Math.sin(t * 1.4);
    renderer.render(scene, camera);
  })();
}
</script>

</body>
</html>
