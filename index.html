<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Sphere AR</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      overflow: hidden; background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }
    #bg     { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    #canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; touch-action: none; }
    #panels { position: fixed; inset: 0; pointer-events: none; z-index: 4; }
    #cards  { position: fixed; inset: 0; pointer-events: none; z-index: 5; }

    /* ── Start overlay ──────────────────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, rgba(8,8,12,0.97) 0%, rgba(20,16,30,0.97) 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 22px; z-index: 30;
    }
    #overlay h1 {
      font-size: 26px; letter-spacing: 8px; font-weight: 600;
      background: linear-gradient(135deg, #b18cff 0%, #5fa8ff 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #overlay p {
      color: rgba(255,255,255,0.5); font-size: 13px; line-height: 1.8;
      text-align: center; max-width: 280px;
    }
    #start-btn {
      margin-top: 6px; padding: 13px 44px;
      background: rgba(255,255,255,0.08);
      color: #fff; border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px; font: inherit; font-size: 14px; letter-spacing: 3px;
      cursor: pointer; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    #start-btn:active { background: rgba(255,255,255,0.16); }

    /* ── Reticle (crosshair + loading ring) ────────────────────────── */
    #reticle {
      display: none;
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 56px; height: 56px;
      z-index: 8; pointer-events: none;
    }
    #reticle .dot {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 6px; height: 6px;
      background: rgba(255,255,255,0.85);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
      transition: width 0.2s, height 0.2s, opacity 0.2s;
    }
    #reticle.hover .dot { width: 3px; height: 3px; opacity: 0.55; }
    #reticle svg {
      position: absolute; inset: 0;
      transform: rotate(-90deg);
      opacity: 0; transition: opacity 0.2s;
    }
    #reticle.hover svg { opacity: 1; }
    #reticle circle.track { fill:none; stroke:rgba(255,255,255,0.18); stroke-width:1.5; }
    #reticle circle.bar {
      fill:none; stroke:rgba(255,255,255,0.95); stroke-width:1.5; stroke-linecap:round;
      stroke-dasharray: 163.36; stroke-dashoffset: 163.36;
      transition: stroke-dashoffset 1.5s linear;
    }
    #reticle.loading circle.bar { stroke-dashoffset: 0; }

    /* Inner lock-on progress ring (fills 0→100% over the same hold duration) */
    #reticle circle.inner-track {
      fill: none; stroke: rgba(255,255,255,0.10); stroke-width: 1;
    }
    #reticle circle.inner-bar {
      fill: none; stroke: rgba(255,255,255,0.85); stroke-width: 1.25; stroke-linecap: round;
      stroke-dasharray: 119.38;        /* 2 * PI * 19 */
      stroke-dashoffset: 119.38;
      transform: rotate(-90deg);
      transform-origin: 28px 28px;
      transition: stroke-dashoffset 1.5s linear;
    }
    #reticle.loading circle.inner-bar { stroke-dashoffset: 0; }

    /* ── Cards ──────────────────────────────────────────────────────── */
    .card {
      position: absolute; top: 0; left: 0;
      transform-origin: 0 0;
      width: 240px;
      background: rgba(20,20,24,0.62);
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 10px 18px 10px 10px;
      display: flex; align-items: center; gap: 12px;
      will-change: transform, opacity;
      transition:
        width 0.5s cubic-bezier(.2,.7,.2,1),
        border-radius 0.5s cubic-bezier(.2,.7,.2,1),
        padding 0.5s cubic-bezier(.2,.7,.2,1),
        background 0.4s, box-shadow 0.4s;
      box-shadow: 0 8px 28px rgba(0,0,0,0.3);
      pointer-events: none; opacity: 0;
    }
    .card.visible { opacity: 1; }
    .avatar {
      flex: 0 0 36px; width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #b18cff 0%, #6f8aff 50%, #5fcfff 100%);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset;
      transition: width 0.5s cubic-bezier(.2,.7,.2,1),
                  height 0.5s cubic-bezier(.2,.7,.2,1),
                  flex-basis 0.5s cubic-bezier(.2,.7,.2,1);
    }
    .head {
      display: flex; align-items: baseline; gap: 6px;
      font-size: 13px; line-height: 1.2; white-space: nowrap; overflow: hidden;
    }
    .head .name { font-weight: 700; color: #fff; }
    .head .meta { color: rgba(255,255,255,0.45); font-weight: 400; font-size: 12px; }
    .body {
      grid-column: 1 / -1; margin-top: 0;
      font-size: 14px; line-height: 1.45; color: rgba(255,255,255,0.92);
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 0.5s cubic-bezier(.2,.7,.2,1),
                  opacity 0.4s ease 0.15s,
                  margin-top 0.5s cubic-bezier(.2,.7,.2,1);
    }
    .card.expanded {
      width: 320px; border-radius: 10px;
      padding: 16px 20px 18px 16px;
      display: grid; grid-template-columns: 44px 1fr; gap: 0 12px;
      align-items: start;
      background: rgba(18,18,22,0.7);
      box-shadow: 0 16px 48px rgba(0,0,0,0.45);
    }
    .card.expanded .avatar { width: 44px; height: 44px; flex-basis: 44px; }
    .card.expanded .head   { padding-top: 4px; }
    .card.expanded .body   { max-height: 240px; opacity: 1; margin-top: 4px; }

    /* ── Panels (map + video) ──────────────────────────────────────── */
    .panel {
      position: absolute; top: 0; left: 0;
      transform-origin: 0 0;
      border-radius: 16px; overflow: hidden;
      background: #000;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 14px 40px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.4s;
      will-change: transform;
      pointer-events: auto;          /* allow touch on panels */
    }
    .panel.visible { opacity: 0.7; }       /* 70% transparency */
    .panel iframe, .panel #map {
      width: 100%; height: 100%; border: 0; display: block;
    }
    .panel-label {
      position: absolute; top: 10px; left: 12px;
      font-size: 10px; letter-spacing: 2px;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.4);
      padding: 4px 8px; border-radius: 999px;
      pointer-events: none; z-index: 2;
    }
    /* Leaflet dark tweaks */
    .leaflet-container { background: #0a0a0c !important; }
    .leaflet-control-attribution { display: none !important; }
    .leaflet-control-zoom { display: none !important; }

    /* Pulsing white user-location marker */
    .pulse-marker { position: relative; width: 14px; height: 14px; }
    .pulse-marker .pulse-core {
      position: absolute; top: 50%; left: 50%;
      width: 10px; height: 10px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px rgba(255,255,255,0.85);
    }
    .pulse-marker .pulse-ring {
      position: absolute; top: 50%; left: 50%;
      width: 14px; height: 14px;
      margin: -7px 0 0 -7px;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      opacity: 0;
      animation: pulseRing 1s linear infinite;
    }
    .pulse-marker .pulse-ring.d2 { animation-delay: 0.5s; }
    @keyframes pulseRing {
      0%   { transform: scale(0.4); opacity: 0.9; border-width: 2px; }
      100% { transform: scale(4.0); opacity: 0;   border-width: 1px; }
    }
  </style>
</head>
<body>

<video id="bg" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="panels"></div>
<div id="cards"></div>

<div id="reticle">
  <svg width="56" height="56" viewBox="0 0 56 56">
    <circle class="track" cx="28" cy="28" r="26"/>
    <circle class="bar"   cx="28" cy="28" r="26"/>
    <circle class="inner-track" cx="28" cy="28" r="19"/>
    <circle class="inner-bar"   cx="28" cy="28" r="19"/>
  </svg>
  <div class="dot"></div>
</div>

<div id="overlay">
  <h1>SPHERE</h1>
  <p>Look around to explore<br>Gaze at a post to expand it</p>
  <button id="start-btn">ENTER</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
function sphToVec3(r, lat, lon) {
  // lon = 0 means directly in front of the default camera (-Z)
  var phi   = THREE.MathUtils.degToRad(90 - lat);
  var theta = THREE.MathUtils.degToRad(lon);
  return new THREE.Vector3(
     r * Math.sin(phi) * Math.sin(theta),
     r * Math.cos(phi),
    -r * Math.sin(phi) * Math.cos(theta)
  );
}

var POSTS = [
  "Hello World! Just dropped something new! What should I do for now?",
  "오늘 한강에서 러닝. 노을이 미쳤다.",
  "새 앨범 작업 중. 베이스라인이 끈적해.",
  "커피 세 잔째. 마감은 친구.",
  "Late night thoughts: what if dreams are just memories from another timeline?",
  "처음으로 김치찌개 성공. 엄마가 자랑스러워해.",
  "Reading 'Dune' again. Spice must flow.",
  "비 오는 날 LP 듣기. 완벽한 토요일.",
  "Just shipped v2.0. Ship it and pray.",
  "Tokyo next week. Recommendations?",
  "이 영화 본 사람? 엔딩 토론하고 싶어.",
  "Building something cool. Stay tuned.",
  "Sunset at the rooftop. No filter needed.",
  "독서 모임 멤버 구함. DM 주세요.",
  "New shoes, new energy. 일단 걷자.",
  "Found this old photo. 2019 felt different.",
  "오랜만에 친구들이랑 보드게임. 4시간 순삭.",
  "Hot take: pineapple belongs on pizza. Fight me.",
  "오늘 산 책 5권. 다 못 읽을 거 알아.",
  "Morning yoga changed my whole vibe.",
  "Snow on the mountain. Take me there.",
  "Just one more episode. (lying)"
];

// 22 cards distributed; front wedge (±90° lon at lat 0) kept clear for map/video panels
var nodes = [
  // equator (back hemisphere only)
  { lat:   0, lon:  90 },
  { lat:   0, lon: 135 },
  { lat:   0, lon: 180 },
  { lat:   0, lon: 225 },
  { lat:   0, lon: 270 },
  // upper band
  { lat:  35, lon:   0 }, { lat: 35, lon:  60 }, { lat: 35, lon: 120 },
  { lat:  35, lon: 180 }, { lat: 35, lon: 240 }, { lat: 35, lon: 300 },
  // lower band
  { lat: -35, lon:  30 }, { lat:-35, lon:  90 }, { lat:-35, lon: 150 },
  { lat: -35, lon: 210 }, { lat:-35, lon: 270 }, { lat:-35, lon: 330 },
  // upper-front above panels
  { lat:  55, lon:   0 },
  // poles
  { lat:  78, lon:   0 },
  { lat: -78, lon:   0 },
  // back fillers
  { lat:   0, lon: 200 },
  { lat: -55, lon: 180 }
].map(function(n, i) {
  return {
    id:   'text' + (i + 1),
    name: 'text' + (i + 1),
    meta: 'your.hz · now',
    body: POSTS[i % POSTS.length],
    lat:  n.lat,
    lon:  n.lon
  };
});

document.getElementById('start-btn').addEventListener('click', async function() {
  // iOS gyro permission first (in same gesture)
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      var res = await DeviceOrientationEvent.requestPermission();
      if (res !== 'granted') {
        alert('Motion & orientation access is required.\nSettings > Safari > Motion & Orientation Access');
        return;
      }
    } catch(e) { alert('Permission error: ' + e.message); return; }
  }
  // Camera
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 } }, audio: false
    });
    document.getElementById('bg').srcObject = stream;
  } catch(e) { console.warn('Camera:', e); }

  document.getElementById('overlay').style.display = 'none';
  document.getElementById('reticle').style.display = 'block';
  init();
});

function init() {
  var canvas = document.getElementById('canvas');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x000000, 0);

  var scene  = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 100);
  scene.add(camera);

  var R_CARD  = 8;
  var R_PANEL = 4;   // closer so panels feel substantial

  // ── Build cards ────────────────────────────────────────────────────
  var cardsRoot = document.getElementById('cards');
  var reticle = document.getElementById('reticle');

  var cards = nodes.map(function(n) {
    var el = document.createElement('div');
    el.className = 'card';
    el.innerHTML =
      '<div class="avatar"></div>' +
      '<div class="head">' +
        '<span class="name">' + n.name + '</span>' +
        '<span class="meta">' + n.meta + '</span>' +
      '</div>' +
      '<div class="body">' + n.body + '</div>';
    cardsRoot.appendChild(el);
    return {
      data: n, el: el,
      worldPos: sphToVec3(R_CARD, n.lat, n.lon),
      expanded: false,
      leftAt: 0
    };
  });

  // ── Build panels (map left, video right) ───────────────────────────
  // Initial forward view = lon 0, lat 0
  // Place panels symmetrically around forward
  var panelsRoot = document.getElementById('panels');

  function makePanel(opts) {
    var el = document.createElement('div');
    el.className = 'panel';
    el.style.width  = opts.w + 'px';
    el.style.height = opts.h + 'px';
    if (opts.label) {
      var lab = document.createElement('div');
      lab.className = 'panel-label';
      lab.textContent = opts.label;
      el.appendChild(lab);
    }
    el.appendChild(opts.inner);
    panelsRoot.appendChild(el);
    return {
      el: el,
      w: opts.w, h: opts.h,
      worldPos: sphToVec3(R_PANEL, opts.lat, opts.lon)
    };
  }

  // MAP (4:3, height matches video)
  var mapHost = document.createElement('div');
  mapHost.id = 'map';
  var MAP_H = 356, MAP_W = 475;        // 4:3 at h=356
  var mapPanel = makePanel({ w: MAP_W, h: MAP_H, lat: 0, lon: -28, label: 'MAP', inner: mapHost });

  // VIDEO (9:16 portrait)
  var iframe = document.createElement('iframe');
  iframe.src = 'https://www.youtube.com/embed/2Kw0XdKqJwE?autoplay=1&controls=0&loop=1&playlist=2Kw0XdKqJwE&modestbranding=1&playsinline=1&rel=0';
  iframe.allow = 'autoplay; encrypted-media; picture-in-picture';
  iframe.setAttribute('playsinline', '');
  var VID_W = 200, VID_H = 356;        // 9:16
  var videoPanel = makePanel({ w: VID_W, h: VID_H, lat: 0, lon: 14, label: 'LIVE', inner: iframe });

  var panels = [mapPanel, videoPanel];

  // Init Leaflet map (Toronto fallback)
  var DEFAULT_LAT = 43.6532, DEFAULT_LON = -79.3832; // Toronto
  var lmap = L.map(mapHost, {
    center: [DEFAULT_LAT, DEFAULT_LON],
    zoom: 13,
    zoomControl: false, attributionControl: false,
    dragging: false, scrollWheelZoom: false, doubleClickZoom: false,
    boxZoom: false, keyboard: false, touchZoom: false, tap: false
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19
  }).addTo(lmap);

  // White marker with pulsing ripple
  var pulseIcon = L.divIcon({
    className: 'pulse-marker',
    html: '<span class="pulse-ring"></span><span class="pulse-ring d2"></span><span class="pulse-core"></span>',
    iconSize: [14, 14], iconAnchor: [7, 7]
  });
  var marker = L.marker([DEFAULT_LAT, DEFAULT_LON], { icon: pulseIcon, interactive: false }).addTo(lmap);
  setTimeout(function() { lmap.invalidateSize(); }, 200);

  // Try real geolocation; on success, recenter
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      var la = pos.coords.latitude, lo = pos.coords.longitude;
      lmap.setView([la, lo], 14);
      marker.setLatLng([la, lo]);
    }, function() { /* keep Toronto */ }, { timeout: 6000, maximumAge: 60000 });
  }

  // ── Gyro ────────────────────────────────────────────────────────────
  var zee = new THREE.Vector3(0, 0, 1);
  var q1  = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));
  var q0  = new THREE.Quaternion();
  var euler = new THREE.Euler();
  var gyroActive = false;
  var alpha0 = null;     // capture initial heading so "front" = where user starts
  var alphaOffset = 0;

  function onOrientation(e) {
    if (e.alpha === null || e.alpha === undefined) return;
    gyroActive = true;
    if (alpha0 === null) {
      alpha0 = e.alpha;
      alphaOffset = THREE.MathUtils.degToRad(alpha0);
    }
    var a = THREE.MathUtils.degToRad(e.alpha) - alphaOffset;
    var b = THREE.MathUtils.degToRad(e.beta);
    var g = THREE.MathUtils.degToRad(e.gamma);
    var o = THREE.MathUtils.degToRad((screen.orientation && screen.orientation.angle) || window.orientation || 0);
    euler.set(b, a, -g, 'YXZ');
    camera.quaternion.setFromEuler(euler);
    camera.quaternion.multiply(q1);
    camera.quaternion.multiply(q0.setFromAxisAngle(zee, -o));
  }
  if ('ondeviceorientationabsolute' in window) {
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
  }
  window.addEventListener('deviceorientation', onOrientation, true);

  // Drag fallback (desktop)
  var dragging = false, px = 0, py = 0, yaw = 0, pitch = 0;
  canvas.addEventListener('pointerdown', function(e) { dragging = true; px = e.clientX; py = e.clientY; });
  window.addEventListener('pointerup',   function()  { dragging = false; });
  canvas.addEventListener('pointermove', function(e) {
    if (!dragging || gyroActive) return;
    yaw   -= (e.clientX - px) * 0.004;
    pitch -= (e.clientY - py) * 0.004;
    pitch  = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
    px = e.clientX; py = e.clientY;
    var qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw);
    var qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), pitch);
    camera.quaternion.multiplyQuaternions(qY, qX);
  });

  window.addEventListener('resize', function() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ── Reticle hover state ────────────────────────────────────────────
  var HOLD_MS  = 1500;
  var CLOSE_MS = 2000;
  var hoverTarget = null, hoverStart = 0;

  function startHover(card) {
    hoverTarget = card; hoverStart = performance.now();
    reticle.classList.add('hover');
    var bar  = reticle.querySelector('circle.bar');
    var ibar = reticle.querySelector('circle.inner-bar');
    [bar, ibar].forEach(function(b) {
      b.style.transition = 'none';
      b.style.strokeDashoffset = (b === bar ? '163.36' : '119.38');
    });
    bar.getBoundingClientRect();
    [bar, ibar].forEach(function(b) { b.style.transition = ''; });
    reticle.classList.add('loading');
  }
  function endHover() {
    hoverTarget = null;
    reticle.classList.remove('hover', 'loading');
    var bar  = reticle.querySelector('circle.bar');
    var ibar = reticle.querySelector('circle.inner-bar');
    [bar, ibar].forEach(function(b) {
      b.style.transition = 'none';
      b.style.strokeDashoffset = (b === bar ? '163.36' : '119.38');
    });
    bar.getBoundingClientRect();
    [bar, ibar].forEach(function(b) { b.style.transition = ''; });
  }

  // ── Project helper ─────────────────────────────────────────────────
  var v = new THREE.Vector3();
  function projectToScreen(worldPos) {
    v.copy(worldPos).project(camera);
    if (v.z > 1 || v.z < -1) return null;
    return {
      x: (v.x * 0.5 + 0.5) * innerWidth,
      y: (-v.y * 0.5 + 0.5) * innerHeight
    };
  }

  // ── Animate ────────────────────────────────────────────────────────
  (function animate() {
    requestAnimationFrame(animate);
    var cx = innerWidth/2, cy = innerHeight/2;

    // Panels (anchor by center)
    for (var p = 0; p < panels.length; p++) {
      var pn = panels[p];
      var sp = projectToScreen(pn.worldPos);
      if (!sp) { pn.el.classList.remove('visible'); continue; }
      if (sp.x < -pn.w || sp.x > innerWidth + pn.w ||
          sp.y < -pn.h || sp.y > innerHeight + pn.h) {
        pn.el.classList.remove('visible'); continue;
      }
      pn.el.classList.add('visible');
      var tx = sp.x - pn.w/2;
      var ty = sp.y - pn.h/2;
      pn.el.style.transform = 'translate3d(' + tx + 'px,' + ty + 'px,0)';
    }

    // Cards
    var hit = null;
    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      var s = projectToScreen(c.worldPos);
      if (!s) { c.el.classList.remove('visible'); continue; }
      if (s.x < -260 || s.x > innerWidth + 20 || s.y < -100 || s.y > innerHeight + 20) {
        c.el.classList.remove('visible'); continue;
      }
      c.el.classList.add('visible');
      var tx = s.x - 22;
      var ty = s.y - (c.expanded ? 30 : 28);
      c.el.style.transform = 'translate3d(' + tx + 'px,' + ty + 'px,0)';

      // Hit-test: is screen center inside the card's bounding rect?
      var r = c.el.getBoundingClientRect();
      var inside = (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom);

      if (inside) {
        c.leftAt = 0;
        if (!hit) hit = c;
      } else if (c.expanded) {
        if (!c.leftAt) c.leftAt = performance.now();
        if (performance.now() - c.leftAt >= CLOSE_MS) {
          c.expanded = false;
          c.leftAt = 0;
          c.el.classList.remove('expanded');
        }
      }
    }

    // Hover/loading on the card under the reticle (only if not yet expanded)
    if (hit && !hit.expanded) {
      if (hoverTarget !== hit) {
        if (hoverTarget) endHover();
        startHover(hit);
      } else if (performance.now() - hoverStart >= HOLD_MS) {
        hit.expanded = true;
        hit.leftAt = 0;
        hit.el.classList.add('expanded');
        endHover();
      }
    } else if (hoverTarget) {
      endHover();
    }

    renderer.render(scene, camera);
  })();
}
</script>

</body>
</html>
